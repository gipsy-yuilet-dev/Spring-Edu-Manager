<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estudiantes | Spring Edu Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(125deg, #77a1d3 0%, #79cbca 45%, #e684ae 100%);
            min-height: 100vh;
        }
        .surface {
            border-radius: 1rem;
            border: 0;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="py-4">
<div class="container">
    <div class="card surface">
        <div class="card-body p-4 p-md-5">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                <div>
                    <h1 class="h2 fw-bold mb-1">Listado de Estudiantes</h1>
                    <p class="text-secondary mb-0">Consulta y gestiona los alumnos registrados.</p>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <a th:href="@{/}" class="btn btn-outline-dark fw-semibold">Inicio</a>
                    <a th:href="@{/estudiantes/nuevo}" class="btn btn-success fw-semibold">Nuevo estudiante</a>
                    <a th:href="@{/cursos}" class="btn btn-primary fw-semibold">Ver cursos</a>
                    <a th:href="@{/interoperabilidad}" class="btn btn-warning fw-semibold">Demo API Frontend</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-dark">Salir</button>
                    </form>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0 bg-white">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Curso</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(estudiantes)}">
                        <td colspan="5" class="text-center text-secondary">No hay estudiantes registrados.</td>
                    </tr>
                    <tr th:each="estudiante : ${estudiantes}">
                        <td th:text="${estudiante.id}">1</td>
                        <td class="fw-semibold" th:text="${estudiante.nombre}">Nombre</td>
                        <td th:text="${estudiante.email}">correo@mail.com</td>
                        <td>
                            <span class="badge text-bg-info" th:text="${estudiante.curso != null ? estudiante.curso.nombre : 'Sin curso'}">Sin curso</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                                <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mt-3">
                <small class="text-secondary" th:text="'Pagina ' + (${currentPage} + 1) + ' de ' + ${totalPages}">Pagina 1 de 1</small>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!hasPrevious} ? ' disabled'"
                       th:href="@{/estudiantes(page=${currentPage - 1},size=${pageSize})}">Anterior</a>
                    <a class="btn btn-outline-primary"
                       th:classappend="${!hasNext} ? ' disabled'"
                       th:href="@{/estudiantes(page=${currentPage + 1},size=${pageSize})}">Siguiente</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
