<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo Curso | Spring Edu Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #ffe259 0%, #ffa751 40%, #fff5de 100%);
            min-height: 100vh;
        }
        .form-shell {
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            border: 0;
        }
    </style>
</head>
<body class="d-flex align-items-center py-4">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
            <div class="card form-shell">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
                        <h1 class="h3 fw-bold mb-0">Crear Nuevo Curso</h1>
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-danger">Cerrar sesion</button>
                        </form>
                    </div>
                    <p class="text-secondary">Solo usuarios con rol ADMIN pueden crear cursos.</p>

                    <form th:action="@{/cursos}" method="post" th:object="${curso}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre</label>
                            <input id="nombre" type="text" class="form-control form-control-lg" th:field="*{nombre}" required>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-semibold">Descripcion</label>
                            <textarea id="descripcion" class="form-control" th:field="*{descripcion}" rows="4"></textarea>
                        </div>

                        <div class="d-flex flex-wrap gap-2">
                            <button type="submit" class="btn btn-warning btn-lg px-4 fw-semibold">Guardar</button>
                            <a th:href="@{/cursos}" class="btn btn-outline-dark btn-lg px-4">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
