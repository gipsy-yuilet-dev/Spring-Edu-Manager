<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso denegado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh;">
<div class="container text-center">
    <h1 class="display-5 fw-bold text-warning">Acceso denegado</h1>
    <p class="lead" th:text="${mensaje}">No tienes permisos para acceder a este recurso.</p>
    <div class="d-flex justify-content-center gap-2">
        <a th:href="@{/estudiantes}" class="btn btn-info text-white">Ir a estudiantes</a>
        <a th:href="@{/cursos}" class="btn btn-outline-light">Ir a cursos</a>
    </div>
</div>
</body>
</html>
