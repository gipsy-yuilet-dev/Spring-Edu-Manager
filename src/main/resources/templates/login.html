<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesion | Spring Edu Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: conic-gradient(from 180deg at 50% 50%, #f6d365, #fda085, #84fab0, #8fd3f4, #f6d365);
        }
        .login-card {
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="d-flex align-items-center py-4">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="card login-card">
                <div class="card-body p-4 p-md-5">
                    <h1 class="h3 fw-bold text-center mb-2">Spring Edu Manager</h1>
                    <p class="text-center text-secondary mb-4">Accede con tu usuario para continuar.</p>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        Usuario o contrasena incorrectos.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        Sesion cerrada correctamente.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Usuario</label>
                            <input id="username" name="username" type="text" class="form-control form-control-lg" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Contrasena</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">Entrar</button>
                    </form>

                    <hr class="my-4">
                    <p class="small text-secondary mb-1">Usuarios de prueba:</p>
                    <p class="small mb-0">ADMIN: admin / admin123</p>
                    <p class="small mb-0">USER: usuario / user123</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
