spring.application.name=SpringEduManager

# H2 en memoria para desarrollo y pruebas de clase
spring.datasource.url=jdbc:h2:mem:edumanagerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Usuarios para demo de seguridad
app.security.admin.username=admin
app.security.admin.password=admin123
app.security.user.username=usuario
app.security.user.password=user123

# Habilita consumo automatico de API via RestTemplate al iniciar (solo demo)
app.rest.client.enabled=false
